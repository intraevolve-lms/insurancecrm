spring:
  mongodb:
    # Distinct from the dev database (insuredindex_test in .env) on purpose — integration
    # tests write and delete real documents, and a shared name previously let a cleanup bug
    # leak test rows straight into dev data. Never point this at the same database as .env.
    uri: mongodb://localhost:27017/insuredindex_it

app:
  jwt:
    secret: test-only-secret-key-must-be-at-least-256-bits-long-for-hmac!!
    access-expiry-minutes: 60
    refresh-expiry-days: 30
  admin:
    email: ""
    password: ""
  security:
    agent-inactivity-timeout-minutes: 30
