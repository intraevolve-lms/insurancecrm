spring:
  application:
    name: insuredindex
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/test}
  data:
    mongodb:
      auto-index-creation: true

server:
  port: 8081

app:
  jwt:
    # No default on purpose — the app must fail fast at startup rather than silently sign
    # tokens with a publicly-known secret. Set JWT_SECRET (32+ chars) in your environment.
    secret: ${JWT_SECRET}
    access-expiry-minutes: 60
    refresh-expiry-days: 30
  admin:
    # Only used once, to seed the very first admin account when the users collection is empty.
    # No defaults on purpose — see DataInitializer for what happens if these are left unset.
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}

logging:
  level:
    org.springframework.web.filter.CommonsRequestLoggingFilter: DEBUG
    com.example.insurancecrm: DEBUG
