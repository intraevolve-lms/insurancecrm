# Reference compose file for deployment — pulls the images published by CI (GitHub Container
# Registry) rather than building from source. Images are public on ghcr.io, so pulling them
# needs no login/credentials at all. Requires a .env file (or exported vars) alongside this
# file with:
#   JWT_SECRET=<32+ char random secret>
#   MONGODB_URI=<Atlas connection string, includes the database name>
#   BACKEND_TAG=latest / FRONTEND_TAG=latest   (or e.g. v1.2.3 to pin/roll back a specific build —
#     these are separate vars because the two images version independently, see DEPLOYMENT.md)
#   ADMIN_EMAIL / ADMIN_PASSWORD  (only needed for the very first boot — see README's
#     "First admin account" section; safe to remove from .env after that first boot)
#
# Usage:
#   docker compose pull
#   docker compose up -d

services:
  backend:
    image: ghcr.io/intraevolve-lms/insuredindex:${BACKEND_TAG:-latest}
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
      MONGODB_URI: ${MONGODB_URI:?MONGODB_URI must be set}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
    expose:
      - "8081"

  frontend:
    image: ghcr.io/intraevolve-lms/insuredindex-fe:${FRONTEND_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
